<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workouts & Library | BCFR Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bcfr-blue: #003D52; --bcfr-gold: #c39d5c; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f8f9fa; }
        
        .header-mini { background: #000; padding: 10px 0; border-bottom: 3px solid var(--bcfr-blue); }
        .logo-small { max-height: 60px; }
        
        .hero-workouts { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('fitness-hero.jpg'); 
            color: white; padding: 60px 0; text-align: center;
        }

        .category-tab { background: var(--bcfr-blue); color: white; padding: 10px 20px; display: inline-block; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }
        
        .video-card { border: none; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .video-card:hover { transform: scale(1.02); }
        .video-placeholder { height: 180px; background: #333; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; }
        
        .workout-title { font-weight: 700; color: var(--bcfr-blue); padding: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="header-mini text-center">
        <a href="index.html"><img src="https://s3.amazonaws.com/tscustomers.targetsafety.com/17453_logo.png?v=201402240942020899" class="logo-small"></a>
    </div>

    <section class="hero-workouts">
        <div class="container">
            <h1 class="display-5 fw-bold text-uppercase">Exercise Library</h1>
            <p class="lead">Functional movements designed for the tactical athlete.</p>
        </div>
    </section>

    <div class="container my-5">
        <div class="category-tab shadow">Mobility & Restoration</div>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card video-card">
                    <div class="video-placeholder">▶</div>
                    <div class="workout-title text-uppercase">Calf Stretch (Slant Board)</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card video-card">
                    <div class="video-placeholder">▶</div>
                    <div class="workout-title text-uppercase">Pallof Press</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card video-card">
                    <div class="video-placeholder">▶</div>
                    <div class="workout-title text-uppercase">Hip Hinge</div>
                </div>
            </div>
        </div>

        <div class="category-tab shadow mt-5">Strength & Power</div>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card video-card">
                    <div class="video-placeholder">▶</div>
                    <div class="workout-title text-uppercase">Goblet Squat</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card video-card">
                    <div class="video-placeholder">▶</div>
                    <div class="workout-title text-uppercase">Trap Bar Deadlift</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card video-card">
                    <div class="video-placeholder">▶</div>
                    <div class="workout-title text-uppercase">Overhead Press</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 text-center text-muted bg-white border-top">
        <small>© 2026 BCFR Physical Readiness | Always Ready</small>
    </footer>

</body>
</html>
